<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accurate Age Calculator - Multi-Tool Hub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; color: #333; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 450px; width: 100%; text-align: center; margin-top: 20px; }
        h1 { color: #2c3e50; margin-bottom: 20px; font-size: 24px; }
        label { display: block; text-align: left; margin-bottom: 8px; font-weight: 600; color: #555; }
        input[type="date"] { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        .result { margin-top: 25px; padding: 15px; background: #eef2f7; border-radius: 6px; font-size: 18px; color: #2c3e50; font-weight: 600; display: none; line-height: 1.6; }
        .back-btn { margin-top: 20px; display: inline-block; color: #7f8c8d; text-decoration: none; font-size: 14px; }
        .back-btn:hover { color: #333; text-decoration: underline; }
        .ad-container { margin: 20px 0; min-height: 90px; background: #fafafa; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <!-- Top Ad Placement -->
    <div class="ad-container">
        <!-- APNE ADSTERRA BANNER YA SOCIAL BAR KA CODE YAHAN PASTE KAREIN -->
    </div>

    <div class="container">
        <h1>Age Calculator</h1>
        <label for="dob">Select Your Date of Birth:</label>
        <input type="date" id="dob" max="2026-06-21">
        
        <button onclick="calculateAge()">Calculate Age</button>
        
        <div id="result" class="result"></div>
        
        <a href="../" class="back-btn">← Back to Home</a>
    </div>

    <!-- Bottom Ad Placement -->
    <div class="ad-container">
        <!-- APNE ADSTERRA POPUNDER YA BANNER KA CODE YAHAN PASTE KAREIN -->
    </div>

    <script>
        // Aaj ki date tak hi select karne dene ke liye max attribute set karna
        document.getElementById('dob').max = new Date().toISOString().split("T")[0];

        function calculateAge() {
            const dobInput = document.getElementById('dob').value;
            if (!dobInput) {
                alert("Please select a valid date of birth!");
                return;
            }

            const dob = new Date(dobInput);
            const today = new Date();

            let years = today.getFullYear() - dob.getFullYear();
            let months = today.getMonth() - dob.getMonth();
            let days = today.getDate() - dob.getDate();

            if (days < 0) {
                months--;
                days += new Date(today.getFullYear(), today.getMonth(), 0).getDate();
            }

            if (months < 0) {
                years--;
                months += 12;
            }

            const resultDiv = document.getElementById('result');
            resultDiv.style.display = "block";
            resultDiv.innerHTML = `You are <span style="color:#e74c3c;">${years}</span> Years, <span style="color:#e74c3c;">${months}</span> Months, and <span style="color:#e74c3c;">${days}</span> Days old.`;
        }
    </script>
</body>
</html>
